<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Madhu ❤️ ThanaSri Love Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
}

h1{
    margin-top:20px;
    color:white;
    font-size:40px;
}

#gameArea{
    position:relative;
    height:70vh;
}

.character{
    position:absolute;
    bottom:50px;
    font-size:80px;
    transition:2s ease-in-out;
}

#madhu{
    left:20%;
}

#thana{
    right:20%;
}

.hug{
    left:45% !important;
}

#proposalBox{
    display:none;
    margin-top:20px;
    font-size:25px;
    color:white;
}

button{
    padding:10px 25px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    color:#ff4e50;
    transition:0.3s;
}

button:hover{
    background:#ff4e50;
    color:white;
}

.heart{
    position:absolute;
    font-size:30px;
    animation:float 3s linear infinite;
}

@keyframes float{
    from{ transform:translateY(0); opacity:1;}
    to{ transform:translateY(-300px); opacity:0;}
}
</style>
</head>

<body>

<h1>💖 Madhu ❤️ ThanaSri 💖</h1>

<div id="gameArea">
    <div id="madhu" class="character">🧑</div>
    <div id="thana" class="character">👩</div>
</div>

<button onclick="startLove()">Start Love Story</button>

<div id="proposalBox">
    <p>Madhu: ThanaSri, I Love You So Much 💍❤️</p>
    <button onclick="sayYes()">Yes 💖</button>
    <button onclick="sayNo()">No 😜</button>
</div>

<audio id="bgMusic" src="https://www.soundjay.com/human/heartbeat-01.wav"></audio>

<script>

function startLove(){
    document.getElementById("bgMusic").play();
    document.getElementById("madhu").classList.add("hug");
    document.getElementById("thana").classList.add("hug");

    setTimeout(()=>{
        document.getElementById("proposalBox").style.display="block";
        createHearts();
    },2000);
}

function sayYes(){
    alert("Awww 🥰 ThanaSri said YES! Forever Together 💞");
    createHearts();
}

function sayNo(){
    alert("No option not allowed 😂 Try Again!");
}

function createHearts(){
    for(let i=0;i<20;i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerText="💖";
        heart.style.left=Math.random()*100+"vw";
        heart.style.top="80vh";
        heart.style.fontSize=(20+Math.random()*30)+"px";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),3000);
    }
}
</script>

</body>
</html>
