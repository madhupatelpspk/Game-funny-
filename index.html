<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Funny 2 Player Hunting Game</title>
<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background: linear-gradient(to top, #87CEEB, #ffffff);
}
h1{
    text-align:center;
    color:#333;
}
#gameArea{
    position:relative;
    width:100vw;
    height:80vh;
    overflow:hidden;
}
.animal{
    position:absolute;
    font-size:50px;
    cursor:pointer;
    transition:0.3s;
}
.animal:hover{
    transform:scale(1.3) rotate(10deg);
}
#scoreBoard{
    display:flex;
    justify-content:space-around;
    font-size:20px;
    background:#222;
    color:white;
    padding:10px;
}
#timer{
    font-weight:bold;
    color:yellow;
}
button{
    display:block;
    margin:10px auto;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>😂 Funny 2 Player Hunting Game 🎯</h1>

<div id="scoreBoard">
    <div>Player 1 (A): <span id="p1">0</span></div>
    <div>Player 2 (L): <span id="p2">0</span></div>
    <div>Time: <span id="timer">30</span></div>
</div>

<div id="gameArea"></div>

<button onclick="startGame()">Start Game</button>

<audio id="shootSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="laughSound" src="https://www.soundjay.com/human/laugh-1.wav"></audio>

<script>
let p1Score=0;
let p2Score=0;
let timeLeft=30;
let gameInterval;
let timerInterval;
let currentAnimal=null;

const animals=["🐔","🐵","🐸","🐷","🐰"];

function startGame(){
    p1Score=0;
    p2Score=0;
    timeLeft=30;
    document.getElementById("p1").innerText=p1Score;
    document.getElementById("p2").innerText=p2Score;
    document.getElementById("timer").innerText=timeLeft;

    spawnAnimal();
    gameInterval=setInterval(spawnAnimal,1500);

    timerInterval=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText=timeLeft;
        if(timeLeft<=0){
            endGame();
        }
    },1000);
}

function spawnAnimal(){
    const gameArea=document.getElementById("gameArea");
    gameArea.innerHTML="";
    const animal=document.createElement("div");
    animal.classList.add("animal");
    animal.innerText=animals[Math.floor(Math.random()*animals.length)];
    animal.style.left=Math.random()*90+"vw";
    animal.style.top=Math.random()*60+"vh";
    gameArea.appendChild(animal);
    currentAnimal=animal;
}

document.addEventListener("keydown",(e)=>{
    if(!currentAnimal) return;

    if(e.key==="a" || e.key==="A"){
        p1Score++;
        document.getElementById("p1").innerText=p1Score;
        hitAnimal();
    }
    if(e.key==="l" || e.key==="L"){
        p2Score++;
        document.getElementById("p2").innerText=p2Score;
        hitAnimal();
    }
});

function hitAnimal(){
    document.getElementById("shootSound").play();
    document.getElementById("laughSound").play();
    currentAnimal.style.transform="scale(2)";
    currentAnimal.style.opacity="0";
    currentAnimal=null;
}

function endGame(){
    clearInterval(gameInterval);
    clearInterval(timerInterval);
    alert("Game Over!\nPlayer 1: "+p1Score+"\nPlayer 2: "+p2Score);
}
</script>

</body>
</html>
